apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-grpc
  labels:
    app: java-grpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-grpc
  template:
    metadata:
      labels:
        app: java-grpc
    spec:
      containers:
        - name: java-grpc
          image: java-grpc:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9090
          livenessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 60
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: java-grpc
spec:
  type: NodePort
  selector:
    app: java-grpc
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30008
