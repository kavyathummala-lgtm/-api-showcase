apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-rest
  labels:
    app: python-rest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-rest
  template:
    metadata:
      labels:
        app: python-rest
    spec:
      containers:
        - name: python-rest
          image: python-rest:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: python-rest
spec:
  type: NodePort
  selector:
    app: python-rest
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30000
