apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-grpc
  labels:
    app: python-grpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-grpc
  template:
    metadata:
      labels:
        app: python-grpc
    spec:
      containers:
        - name: python-grpc
          image: python-grpc:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 50051
          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: python-grpc
spec:
  type: NodePort
  selector:
    app: python-grpc
  ports:
    - port: 50051
      targetPort: 50051
      nodePort: 30002
