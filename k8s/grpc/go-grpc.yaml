apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-grpc
  labels:
    app: go-grpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-grpc
  template:
    metadata:
      labels:
        app: go-grpc
    spec:
      containers:
        - name: go-grpc
          image: go-grpc:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 50052
          livenessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: go-grpc
spec:
  type: NodePort
  selector:
    app: go-grpc
  ports:
    - port: 50052
      targetPort: 50052
      nodePort: 30005
