apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-rest
  labels:
    app: java-rest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-rest
  template:
    metadata:
      labels:
        app: java-rest
    spec:
      containers:
        - name: java-rest
          image: java-rest:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9000
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: java-rest
spec:
  type: NodePort
  selector:
    app: java-rest
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30006
