apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-graphql
  labels:
    app: python-graphql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-graphql
  template:
    metadata:
      labels:
        app: python-graphql
    spec:
      containers:
        - name: python-graphql
          image: python-graphql:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: python-graphql
spec:
  type: NodePort
  selector:
    app: python-graphql
  ports:
    - port: 8001
      targetPort: 8001
      nodePort: 30001
