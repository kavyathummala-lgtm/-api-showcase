apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-rest
  labels:
    app: go-rest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-rest
  template:
    metadata:
      labels:
        app: go-rest
    spec:
      containers:
        - name: go-rest
          image: go-rest:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: go-rest
spec:
  type: NodePort
  selector:
    app: go-rest
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30003
