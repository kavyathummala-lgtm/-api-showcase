apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-graphql
  labels:
    app: go-graphql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-graphql
  template:
    metadata:
      labels:
        app: go-graphql
    spec:
      containers:
        - name: go-graphql
          image: go-graphql:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: go-graphql
spec:
  type: NodePort
  selector:
    app: go-graphql
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30004
