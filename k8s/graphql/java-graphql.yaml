apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-graphql
  labels:
    app: java-graphql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-graphql
  template:
    metadata:
      labels:
        app: java-graphql
    spec:
      containers:
        - name: java-graphql
          image: java-graphql:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9001
          livenessProbe:
            httpGet:
              path: /health
              port: 9001
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 9001
            initialDelaySeconds: 60
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: java-graphql
spec:
  type: NodePort
  selector:
    app: java-graphql
  ports:
    - port: 9001
      targetPort: 9001
      nodePort: 30007
